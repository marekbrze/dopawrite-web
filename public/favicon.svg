<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="#f4efe5"/>
  <!-- Pencil icon in brand brown -->
  <!-- Pencil body -->
  <rect x="13" y="5" width="7" height="16" rx="1.5" fill="#5c4a38"/>
  <!-- Pencil tip (triangle) -->
